# Databricks Asset Bundle — deploy a serverless multi-task Job
# (Lakeflow Jobs / Workflows UI).
# Prerequisites: Databricks CLI authenticated to your workspace.
#
# Deploy:  databricks bundle deploy
# Run:     databricks bundle run orders_medallion
#
bundle:
  name: orders-demo

variables:
  bronze_schema:
    description: Bronze schema for raw landing tables
    default: "orders_bronze"
  silver_schema:
    description: Silver schema for cleaned, typed tables
    default: "orders_silver"
  gold_schema:
    description: Gold schema for marts and serving tables
    default: "orders_gold"

resources:
  jobs:
    orders_medallion:
      name: "Silver & Gold Pipeline"
      max_concurrent_runs: 1
      tasks:
        - task_key: silver_pyspark
          spark_python_task:
            python_file: ./pipeline/run_silver_job.py
            parameters:
              - --bronze-schema
              - ${var.bronze_schema}
              - --silver-schema
              - ${var.silver_schema}
          environment_key: default
        - task_key: gold_pyspark
          depends_on:
            - task_key: silver_pyspark
          spark_python_task:
            python_file: ./pipeline/run_gold_job.py
            parameters:
              - --silver-schema
              - ${var.silver_schema}
              - --gold-schema
              - ${var.gold_schema}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "5"

targets:
  dev:
    workspace:
      host: dbc-6269c81d-f369.cloud.databricks.com
    # mode: development
    default: true
