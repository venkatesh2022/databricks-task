# Databricks Asset Bundle — deploy a multi-task Job (Lakeflow Jobs / Workflows UI).
# Prerequisites: Databricks CLI (`pip install databricks-cli`) authenticated to your workspace.
#
# Deploy:  databricks bundle deploy
# Run:     databricks bundle run orders_medallion
#
# Override cluster (recommended for Free/Community): create databricks.override.yml or pass:
#   databricks bundle deploy --var="cluster_id=YOUR_EXISTING_CLUSTER_ID"
#
bundle:
  name: orders-demo

variables:
  cluster_id:
    description: Optional existing all-purpose or jobs cluster ID (skips job_cluster when set)
    default: ""

resources:
  jobs:
    orders_medallion:
      name: "${bundle.name} — Silver & Gold (PySpark)"
      max_concurrent_runs: 1
      tasks:
        - task_key: silver_pyspark
          job_cluster_key: shared
          spark_python_task:
            python_file: ./pipeline/run_silver_job.py
        - task_key: gold_pyspark
          depends_on:
            - task_key: silver_pyspark
          job_cluster_key: shared
          spark_python_task:
            python_file: ./pipeline/run_gold_job.py

      job_clusters:
        - job_cluster_key: shared
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5.large
            num_workers: 1
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

targets:
  dev:
    mode: development
    default: true
